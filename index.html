<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Location 1600</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --text: #e0e0e0;
            --dim-text: #666666;
            --border: #2a2a2a;
            --accent: #ffffff;
            --error: #ff4444;
            --success: #2ecc71;
            --warning: #f1c40f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; border-radius: 0 !important; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.5;
        }

        #game-window {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--surface);
            overflow: hidden;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px;
            background: var(--surface);
            z-index: 5;
        }

        .hidden { display: none !important; }

        #dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .dash-box { background: var(--surface); padding: 15px 5px; text-align: center; border-right: 1px solid var(--border); }
        .dash-box:last-child { border-right: none; }
        .dash-box i { display: block; font-size: 0.9rem; color: var(--dim-text); margin-bottom: 8px; }
        .dash-label { display: block; font-size: 0.6rem; color: var(--dim-text); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .dash-value { font-size: 1.1rem; font-weight: 600; }

        #news-line { color: var(--dim-text); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        #news-line i { margin-right: 10px; }

        #scenario-text { flex-grow: 1; font-size: 1.1rem; font-weight: 300; line-height: 1.7; }
        #choice-container { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }

        .btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 18px 25px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .btn:hover .stat-preview { color: var(--bg); border-left-color: rgba(0,0,0,0.2); }

        .stat-preview { 
            font-family: monospace; 
            font-size: 0.7rem; 
            padding-left: 15px; 
            border-left: 1px solid var(--border);
            white-space: pre;
            text-align: right;
            line-height: 1.2;
            min-width: 80px;
        }

        .role-card { border: 1px solid var(--border); padding: 25px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 20px; }
        .role-card:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }

        #error-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            color: var(--error);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 1.4rem; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 40px; text-align: center; }

        @media (max-width: 600px) {
            #dashboard { grid-template-columns: 1fr 1fr; }
            .screen { padding: 25px; }
            #game-window { height: 100vh; border: none; }
        }
    </style>
</head>
<body>

<div id="game-window">
    <div id="error-overlay" class="hidden">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; margin-bottom: 20px;"></i>
        <h2 style="text-transform: uppercase; letter-spacing: 2px;">Something Went Wrong</h2>
        <p id="error-message" style="color: var(--dim-text); margin-bottom: 30px;"></p>
        <button class="btn" onclick="location.reload()">Retry</button>
    </div>

    <div id="start-screen" class="screen" style="justify-content: center;">
        <h1><i class="fa-solid fa-building-columns"></i><br>Location 1600</h1>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <button class="btn" style="width: 200px; justify-content: center;" onclick="checkSystem()">Play</button>
            <button class="btn" style="width: 200px; justify-content: center; border-color: transparent; color: var(--dim-text);" onclick="window.location.href='about.html'">About</button>
        </div>
    </div>

    <div id="char-screen" class="screen hidden">
        <h1>Select Difficulty</h1>
        <div class="role-card" onclick="startGame(80, 2000, 70)">
            <i class="fa-solid fa-gauge" style="color: var(--success);"></i>
            <div><strong>EASY</strong><br><small>High stability. Plenty of room for error.</small></div>
        </div>
        <div class="role-card" onclick="startGame(50, 1000, 50)">
            <i class="fa-solid fa-gauge" style="color: var(--warning);"></i>
            <div><strong>MEDIUM</strong><br><small>Balanced stats. Standard challenge.</small></div>
        </div>
        <div class="role-card" onclick="startGame(30, 500, 30)">
            <i class="fa-solid fa-gauge" style="color: var(--error);"></i>
            <div><strong>HARD</strong><br><small>Crisis levels. Every choice is life or death.</small></div>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="dashboard">
            <div class="dash-box"><i class="fa-solid fa-heart-pulse"></i><span class="dash-label">Approval</span><span id="stat-app" class="dash-value">--</span></div>
            <div class="dash-box"><i class="fa-solid fa-vault"></i><span class="dash-label">Treasury</span><span id="stat-bud" class="dash-value">--</span></div>
            <div class="dash-box"><i class="fa-solid fa-jet-fighter"></i><span class="dash-label">Military</span><span id="stat-mil" class="dash-value">--</span></div>
            <div class="dash-box"><i class="fa-solid fa-calendar-day"></i><span class="dash-label">Month</span><span id="turn-num" class="dash-value">1</span></div>
        </div>
        <div id="news-line"></div>
        <div id="scenario-text"></div>
        <div id="choice-container"></div>
    </div>

    <div id="end-screen" class="screen hidden" style="justify-content:center; text-align:center;">
        <h1 id="end-title">Term Ended</h1>
        <p id="end-reason" style="margin-bottom: 10px; color: var(--dim-text);"></p>
        <p id="end-legacy" style="font-weight: bold; margin-bottom: 40px; color: var(--accent);"></p>
        <button class="btn" style="width: 220px; align-self: center; justify-content: center;" onclick="location.reload()">
            <i class="fa-solid fa-rotate-right" style="margin-right: 10px;"></i> Restart
        </button>
    </div>
</div>

<script src="missions.js"></script>

<script>
    let stats = { app: 50, bud: 1000, mil: 50 };
    let turn = 1;
    let pool = [];
    let underInquiry = false;

    function showError(msg) {
        document.getElementById('error-message').innerText = msg;
        document.getElementById('error-overlay').classList.remove('hidden');
    }

    function checkSystem() {
        if (typeof missions === 'undefined' || !Array.isArray(missions)) {
            showError("missions.js file missing or corrupted.");
            return;
        }
        showScreen('char-screen');
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function startGame(app, bud, mil) {
        stats = { app, bud, mil };
        turn = 1;
        underInquiry = false;
        pool = [...missions];
        showScreen('game-screen');
        updateUI();
        loadMission();
    }

    function updateUI() {
        document.getElementById('stat-app').innerText = stats.app + "%";
        document.getElementById('stat-bud').innerText = "$" + stats.bud + "m";
        document.getElementById('stat-mil').innerText = stats.mil + "%";
        document.getElementById('turn-num').innerText = turn + "/48";

        // 1. Check for Trigger FIRST (Before they hit 0)
        if (stats.app > 0 && stats.app < 15 && !underInquiry) {
            triggerImpeachment();
            return; // Stop execution so Game Over doesn't fire yet
        } 
        
        if (stats.mil > 0 && stats.mil < 15 && !underInquiry) {
            triggerCoup();
            return; // Stop execution
        }

        // 2. Check for Hard Game Over
        if (stats.app <= 0) gameOver("IMPEACHED: The Senate has removed you from office.");
        else if (stats.bud <= 0) gameOver("BANKRUPT: National credit has hit zero.");
        else if (stats.mil <= 0) gameOver("COUP: The military has seized the capital.");
        else if (turn >= 48) gameOver("SUCCESS: You served your full term.");
    }

    function triggerImpeachment() {
        underInquiry = true;
        document.getElementById('news-line').innerHTML = `<i class="fa-solid fa-gavel" style="color:var(--error)"></i> CONSTITUTIONAL CRISIS`;
        document.getElementById('scenario-text').innerText = "Your approval is dangerously low. The House has filed Articles of Impeachment. You must defend your office in the Senate trial.";
        
        renderCrisisOptions([
            { text: "Lobby the Senate", sub: "Spend $500m on 'political donations'.", run: (s) => { s.bud -= 500; s.app += 20; } },
            { text: "Rally the People", sub: "A risky 50/50 speech to save your seat.", run: (s) => { if(Math.random() > 0.5) { s.app += 30; } else { s.app = 0; } } },
            { text: "Resign", sub: "Exit with a shred of dignity.", run: (s) => { s.app = 0; } }
        ]);
    }

    function triggerCoup() {
        underInquiry = true;
        document.getElementById('news-line').innerHTML = `<i class="fa-solid fa-person-rifle" style="color:var(--error)"></i> MILITARY UNREST`;
        document.getElementById('scenario-text').innerText = "The Generals claim you've weakened the state. Tanks are moving toward the Palace. They demand your immediate resignation.";
        
        renderCrisisOptions([
            { text: "Bribe the High Command", sub: "Give the Military $400m.", run: (s) => { s.bud -= 400; s.mil += 25; } },
            { text: "Order Counter-Arrest", sub: "Try to purge the traitors (40% success).", run: (s) => { if(Math.random() > 0.6) { s.mil += 35; } else { s.mil = 0; } } },
            { text: "Flee in Secret", sub: "Escape to a neighboring country.", run: (s) => { s.mil = 0; } }
        ]);
    }

    function renderCrisisOptions(options) {
        const container = document.getElementById('choice-container');
        container.innerHTML = ""; // Clear existing mission buttons
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "btn";
            btn.innerHTML = `<div><strong>${opt.text}</strong><br><small>${opt.sub}</small></div><div class="stat-preview">CRISIS</div>`;
            btn.onclick = () => { 
                opt.run(stats); 
                underInquiry = false; // Reset flag AFTER choice is made
                updateUI(); 
                if(!underInquiry && stats.app > 0 && stats.mil > 0 && stats.bud > 0) loadMission(); 
            };
            container.appendChild(btn);
        });
    }

    function formatDelta(val, label) {
        if (!val) return "";
        if (val === '?') return `?? ${label}`;
        return `${val > 0 ? '+' : ''}${val} ${label}`;
    }

    function loadMission() {
        if (underInquiry) return;
        if (pool.length === 0) pool = [...missions];
        const idx = Math.floor(Math.random() * pool.length);
        const m = pool.splice(idx, 1)[0];

        document.getElementById('scenario-text').innerText = m.text;
        document.getElementById('news-line').innerHTML = `<i class="fa-solid fa-folder-open"></i> REPORT: ${m.news}`;
        
        const container = document.getElementById('choice-container');
        container.innerHTML = "";

        m.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "btn";
            let d = opt.deltas || {};
            let preview = [formatDelta(d.app, "APP"), formatDelta(d.bud, "BUD"), formatDelta(d.mil, "MIL")].filter(x => x !== "").join("\n");

            btn.innerHTML = `
                <div style="flex-grow: 1; padding-right: 10px;">
                    <div style="font-weight: 600;">${opt.text}</div>
                    <div style="font-size: 0.65rem; color: var(--dim-text); text-transform: none; margin-top: 4px;">${opt.sub}</div>
                </div>
                <div class="stat-preview">${preview}</div>
            `;
            btn.onclick = () => { 
                opt.run(stats); 
                turn++; 
                updateUI(); 
                if(turn <= 48 && stats.app >= 15 && stats.mil >= 15 && stats.bud > 0) loadMission(); 
            };
            container.appendChild(btn);
        });
    }

    function getLegacy() {
        if (stats.app > 80 && stats.mil > 80) return "Legacy: The Great Unifier";
        if (stats.mil > 80 && stats.app < 30) return "Legacy: The Iron Dictator";
        if (stats.bud > 2000 && stats.app < 30) return "Legacy: The Greedy Oligarch";
        if (stats.app > 80 && stats.bud < 200) return "Legacy: The Beloved Spendthrift";
        if (turn < 12) return "Legacy: A Brief Footnote";
        return "Legacy: The Average Servant";
    }

    function gameOver(reason) {
        showScreen('end-screen');
        document.getElementById('end-reason').innerText = reason;
        document.getElementById('end-legacy').innerText = getLegacy();
        if (turn >= 48) document.getElementById('end-title').innerText = "Term Successful";
    }
</script>
</body>
</html>
